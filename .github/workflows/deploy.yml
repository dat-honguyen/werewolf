name: Deploy backend

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: werewolf
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Deploy to EC2 via SSM
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: werewolf
          IMAGE_TAG: ${{ github.sha }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:$IMAGE_TAG"

          # Built with jq so the $(...) command substitution below only ever runs on
          # the remote box (via the SSM agent), never expands here on the GH runner.
          COMMANDS=$(jq -n \
            --arg region "$AWS_REGION" \
            --arg registry "$REGISTRY" \
            --arg image "$IMAGE" \
            '[
              "set -e",
              ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $registry),
              ("docker pull " + $image),
              ("DB_CONN=$(aws ssm get-parameter --name /werewolf/prod/db-connection-string --with-decryption --query Parameter.Value --output text --region " + $region + ")"),
              "docker stop werewolf-api || true",
              "docker rm werewolf-api || true",
              ("docker run -d --name werewolf-api --restart unless-stopped -p 5000:8080 -e TDIL_ConnectionStrings__database=\"$DB_CONN\" " + $image),
              "docker image prune -f"
            ]')

          jq -n \
            --arg instance_id "$INSTANCE_ID" \
            --arg comment "Deploy werewolf backend $IMAGE_TAG" \
            --argjson commands "$COMMANDS" \
            '{InstanceIds: [$instance_id], DocumentName: "AWS-RunShellScript", Comment: $comment, Parameters: {commands: $commands}}' \
            > ssm-params.json

          COMMAND_ID=$(aws ssm send-command --cli-input-json file://ssm-params.json \
            --query "Command.CommandId" --output text)

          echo "SSM command: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)
          echo "Status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
