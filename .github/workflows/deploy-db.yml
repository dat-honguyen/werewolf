name: Deploy Postgres to EC2

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Stand up Postgres on EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # Built with jq so the $(...) command substitution below only ever runs on
          # the remote box (via the SSM agent), never expands here on the GH runner.
          COMMANDS=$(jq -n \
            --arg region "$AWS_REGION" \
            '[
              "set -e",
              "docker network create werewolf-net || true",
              ("DB_CONN=$(aws ssm get-parameter --name /werewolf/prod/db-connection-string --with-decryption --query Parameter.Value --output text --region " + $region + ")"),
              "DB_USER=$(echo \"$DB_CONN\" | sed -n \"s/.*User ID=\\([^;]*\\).*/\\1/p\")",
              "DB_PASSWORD=$(echo \"$DB_CONN\" | sed -n \"s/.*Password=\\([^;]*\\).*/\\1/p\")",
              "DB_NAME=$(echo \"$DB_CONN\" | sed -n \"s/.*Database=\\([^;]*\\).*/\\1/p\")",
              "docker stop werewolf-postgres || true",
              "docker rm werewolf-postgres || true",
              "docker run -d --name werewolf-postgres --restart unless-stopped --network werewolf-net -p 127.0.0.1:5432:5432 -e POSTGRES_DB=\"$DB_NAME\" -e POSTGRES_USER=\"$DB_USER\" -e POSTGRES_PASSWORD=\"$DB_PASSWORD\" -v werewolf-pgdata:/var/lib/postgresql/data postgres:17",
              "sleep 5",
              "docker exec werewolf-postgres pg_isready"
            ]')

          jq -n \
            --arg instance_id "$INSTANCE_ID" \
            --arg comment "Deploy werewolf postgres to EC2" \
            --argjson commands "$COMMANDS" \
            '{InstanceIds: [$instance_id], DocumentName: "AWS-RunShellScript", Comment: $comment, Parameters: {commands: $commands}}' \
            > ssm-params.json

          COMMAND_ID=$(aws ssm send-command --cli-input-json file://ssm-params.json \
            --query "Command.CommandId" --output text)

          echo "SSM command: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)
          echo "Status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
