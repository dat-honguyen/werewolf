name: Debug EC2 containers

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Inspect containers via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          COMMANDS=$(jq -n '[
            "docker ps -a",
            "echo ---werewolf-api-logs---",
            "docker logs --tail 100 werewolf-api 2>&1 || true",
            "echo ---werewolf-postgres-logs---",
            "docker logs --tail 50 werewolf-postgres 2>&1 || true",
            "echo ---werewolf-net---",
            "docker network inspect werewolf-net 2>&1 || true"
          ]')

          jq -n \
            --arg instance_id "$INSTANCE_ID" \
            --arg comment "Debug werewolf EC2 containers" \
            --argjson commands "$COMMANDS" \
            '{InstanceIds: [$instance_id], DocumentName: "AWS-RunShellScript", Comment: $comment, Parameters: {commands: $commands}}' \
            > ssm-params.json

          COMMAND_ID=$(aws ssm send-command --cli-input-json file://ssm-params.json \
            --query "Command.CommandId" --output text)

          echo "SSM command: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text
